<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Inter',sans-serif}
::selection{background:#cba6f7;color:#11111b}
</style>
</helmet>
<div style="display:flex;flex-wrap:wrap">
  <sc-for list="{{ variants }}" as="v" hint-placeholder-count="2">
    <div style="width:420px;height:560px;background:{{ v.pageBg }};position:relative;overflow:hidden;box-sizing:border-box;border-right:1px solid rgba(0,0,0,0.15);border-bottom:1px solid rgba(0,0,0,0.15)">

      <div style="position:absolute;top:14px;left:16px;font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:{{ v.labelColor }}">{{ v.label }}</div>

      <div style="position:absolute;top:44px;right:24px;width:34px;height:34px;border-radius:6px;background:{{ v.triggerBg }};display:flex;align-items:center;justify-content:center;color:{{ v.textMuted }}">
        <svg width="17" height="17" viewBox="0 0 256 256" fill="currentColor"><path d="M208.49 96.49l-72 72a12 12 0 01-17 0l-72-72a12 12 0 0117-17L128 143l63.51-63.52a12 12 0 0117 17z"/></svg>
      </div>

      <div style="position:absolute;top:86px;right:24px;width:360px;background:{{ v.cardBg }};border:1px solid {{ v.cardBorder }};border-radius:10px;box-shadow:{{ v.cardShadow }};font-family:'Inter',sans-serif;color:{{ v.textPrimary }};display:flex;flex-direction:column;overflow:hidden">

        <sc-if value="{{ v.showWatermark }}" hint-placeholder-val="{{ false }}">
          <svg width="140" height="140" viewBox="0 0 140 140" style="position:absolute;top:-30px;right:-30px;opacity:{{ v.watermarkOpacity }};pointer-events:none">
            <polygon points="70,10 116,36 116,88 70,114 24,88 24,36" fill="none" stroke="{{ v.accent }}" stroke-width="1"/>
            <polygon points="70,34 96,49 96,79 70,94 44,79 44,49" fill="none" stroke="{{ v.accent }}" stroke-width="1"/>
            <circle cx="70" cy="64" r="10" fill="none" stroke="{{ v.accent }}" stroke-width="1"/>
          </svg>
        </sc-if>
        <sc-if value="{{ v.glowTop }}" hint-placeholder-val="{{ false }}">
          <div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,{{ v.accent }},transparent)"></div>
        </sc-if>

        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid {{ v.cardBorder }};position:relative">
          <div style="font-size:13px;font-weight:600;color:{{ v.textPrimary }}">Updates ({{ updates.length }})</div>
          <div style="width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:{{ v.textMuted }};cursor:pointer" style-hover="background:{{ v.hoverBg }}">
            <svg width="13" height="13" viewBox="0 0 256 256" fill="currentColor"><path d="M205.66 194.34a8 8 0 01-11.32 11.32L128 139.31l-66.34 66.35a8 8 0 01-11.32-11.32L116.69 128 50.34 61.66a8 8 0 0111.32-11.32L128 116.69l66.34-66.35a8 8 0 0111.32 11.32L139.31 128z"/></svg>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;max-height:340px;overflow-y:auto;position:relative">
          <sc-for list="{{ updates }}" as="pkg" hint-placeholder-count="6">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 14px;border-bottom:1px solid {{ v.rowBorder }}" style-hover="background:{{ v.hoverBg }}">
              <div style="display:flex;align-items:center;gap:7px;min-width:0">
                <span style="font-size:12.5px;font-weight:500;color:{{ v.textPrimary }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ pkg.name }}</span>
                <sc-if value="{{ pkg.aur }}" hint-placeholder-val="{{ true }}">
                  <span style="flex:none;font-size:9.5px;font-weight:600;letter-spacing:.02em;color:#cba6f7;background:rgba(203,166,247,0.12);border:1px solid rgba(203,166,247,0.3);border-radius:6px;padding:1px 5px;line-height:1.4">AUR</span>
                </sc-if>
              </div>
              <div style="flex:none;font-family:'JetBrains Mono',monospace;font-size:11px;color:{{ v.textMuted }};display:flex;align-items:center;gap:5px">
                <span>{{ pkg.oldVersion }}</span>
                <span style="color:{{ v.arrowColor }}">→</span>
                <span style="color:{{ v.newVerColor }}">{{ pkg.newVersion }}</span>
              </div>
            </div>
          </sc-for>
        </div>

        <div style="padding:12px 14px;position:relative">
          <div style="width:100%;box-sizing:border-box;text-align:center;padding:8px 0;border-radius:6px;background:transparent;border:1px solid #007acc;color:#007acc;font-size:12.5px;font-weight:600;cursor:pointer;transition:color .12s,border-color .12s" style-hover="border-color:#cba6f7;color:#cba6f7">
            Upgrade all
          </div>
        </div>

      </div>
    </div>
  </sc-for>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:840,&quot;height&quot;:580}}">
class Component extends DCLogic {
  renderVals() {
    const updates = [
      { name: 'linux-firmware', aur: false, oldVersion: '20240909.12', newVersion: '20241017.4' },
      { name: 'zed', aur: true, oldVersion: '0.145.2', newVersion: '0.146.0' },
      { name: 'mesa', aur: false, oldVersion: '24.2.3-1', newVersion: '24.2.4-1' },
      { name: 'ttf-jetbrains-mono-nerd', aur: true, oldVersion: '3.2.1', newVersion: '3.3.0' },
      { name: 'pipewire', aur: false, oldVersion: '1.2.4-1', newVersion: '1.2.5-1' },
      { name: 'wl-clipboard', aur: false, oldVersion: '2.2.1-1', newVersion: '2.2.1-2' },
      { name: 'visual-studio-code-bin', aur: true, oldVersion: '1.93.1', newVersion: '1.94.0' },
    ];

    const dark = {
      pageBg: '#11111b', labelColor: '#45475a', triggerBg: '#313244', cardBg: '#1e1e2e',
      cardBorder: '#313244', cardShadow: 'none', textPrimary: '#cdd6f4', textMuted: '#6c7086',
      hoverBg: '#24243a', rowBorder: '#24243a', arrowColor: '#45475a', newVerColor: '#a6adc8',
      accent: '#007acc', showWatermark: false, glowTop: false, watermarkOpacity: 0,
    };

    const light = {
      pageBg: '#dde0f2', labelColor: '#7d80a6', triggerBg: '#e6e9fa', cardBg: '#e6e9fa',
      cardBorder: '#c4c8e6', cardShadow: '0 6px 24px rgba(60,64,110,0.16), inset 0 0 0 1px rgba(0,122,204,0.15)',
      textPrimary: '#2c2e4a', textMuted: '#5a5d80', hoverBg: '#e0e3f4', rowBorder: '#d3d7ee',
      arrowColor: '#a8abcc', newVerColor: '#5a5d80', accent: '#007acc',
      showWatermark: true, glowTop: true, watermarkOpacity: 0.18,
    };

    return {
      updates,
      variants: [
        { ...dark, label: 'Dark — reference' },
        { ...light, label: 'Light — accepted (Light C)' },
      ],
    };
  }
}
</script>
</body>
</html>
