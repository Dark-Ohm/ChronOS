<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Inter',sans-serif}
::selection{background:#cba6f7;color:#11111b}
input[type=range].gpui-slider{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:3px;outline:none}
input[type=range].gpui-slider::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:currentColor;cursor:pointer;border:none}
input[type=range].gpui-slider::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:currentColor;cursor:pointer;border:none}
</style>
</helmet>
<div style="display:flex;flex-wrap:wrap">
  <sc-for list="{{ variants }}" as="v" hint-placeholder-count="2">
    <div style="width:420px;height:640px;background:{{ v.pageBg }};position:relative;overflow:hidden;box-sizing:border-box;border-right:1px solid rgba(0,0,0,0.15);border-bottom:1px solid rgba(0,0,0,0.15)">

      <div style="position:absolute;top:14px;left:16px;font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:{{ v.labelColor }}">{{ v.label }}</div>

      <div style="position:absolute;top:44px;right:24px;width:34px;height:34px;border-radius:6px;background:{{ v.triggerBg }};display:flex;align-items:center;justify-content:center;color:{{ v.textMuted }}">
        <svg width="16" height="16" viewBox="0 0 256 256" fill="currentColor"><path d="M155.51 24.81a8 8 0 00-8.42.88L77.25 80H32a16 16 0 00-16 16v64a16 16 0 0016 16h45.25l69.84 54.31A8 8 0 00160 224V32a8 8 0 00-4.49-7.19zM208 160a8 8 0 010-16 16 16 0 000-32 8 8 0 010-16 32 32 0 010 64z"/></svg>
      </div>

      <div style="position:absolute;top:86px;right:24px;width:360px;background:{{ v.cardBg }};border:1px solid {{ v.cardBorder }};border-radius:10px;box-shadow:{{ v.cardShadow }};font-family:'Inter',sans-serif;color:{{ v.textPrimary }};display:flex;flex-direction:column;overflow:hidden">

        <sc-if value="{{ v.showWatermark }}" hint-placeholder-val="{{ false }}">
          <svg width="140" height="140" viewBox="0 0 140 140" style="position:absolute;top:-30px;right:-30px;opacity:{{ v.watermarkOpacity }};pointer-events:none">
            <polygon points="70,10 116,36 116,88 70,114 24,88 24,36" fill="none" stroke="{{ v.accent }}" stroke-width="1"/>
            <polygon points="70,34 96,49 96,79 70,94 44,79 44,49" fill="none" stroke="{{ v.accent }}" stroke-width="1"/>
            <circle cx="70" cy="64" r="10" fill="none" stroke="{{ v.accent }}" stroke-width="1"/>
          </svg>
        </sc-if>
        <sc-if value="{{ v.glowTop }}" hint-placeholder-val="{{ false }}">
          <div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,{{ v.accent }},transparent)"></div>
        </sc-if>

        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid {{ v.cardBorder }};position:relative">
          <div style="font-size:13px;font-weight:600;color:{{ v.textPrimary }}">Sound</div>
          <div style="width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:{{ v.textMuted }};cursor:pointer" style-hover="background:{{ v.hoverBg }}">
            <svg width="13" height="13" viewBox="0 0 256 256" fill="currentColor"><path d="M205.66 194.34a8 8 0 01-11.32 11.32L128 139.31l-66.34 66.35a8 8 0 01-11.32-11.32L116.69 128 50.34 61.66a8 8 0 0111.32-11.32L128 116.69l66.34-66.35a8 8 0 0111.32 11.32L139.31 128z"/></svg>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;padding:14px;gap:16px;position:relative">

          <div style="display:flex;flex-direction:column;gap:8px;position:relative">
            <div style="display:flex;align-items:center;justify-content:space-between">
              <div style="display:flex;align-items:center;gap:7px;cursor:pointer;border-radius:6px;padding:2px 4px;margin:-2px -4px" onclick="{{ v.toggleVolumeMenu }}" style-hover="background:{{ v.hoverBg }}">
                <div style="width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:{{ v.textMuted }};cursor:pointer" onclick="{{ v.toggleVolumeMute }}" style-hover="background:{{ v.hoverBg }}">
                  <sc-if value="{{ v.volumeMuted }}" hint-placeholder-val="{{ false }}">
                    <svg width="15" height="15" viewBox="0 0 256 256" fill="currentColor"><path d="M155.51 24.81a8 8 0 00-8.42.88L77.25 80H32a16 16 0 00-16 16v64a16 16 0 0016 16h45.25l69.84 54.31A8 8 0 00160 224V32a8 8 0 00-4.49-7.19zM224.49 103.51a8 8 0 00-11.31 11.31L228.69 130l-15.51 15.51a8 8 0 0011.31 11.31l15.51-15.51 15.51 15.51a8 8 0 0011.31-11.31L251.31 130l15.51-15.51a8 8 0 00-11.31-11.31L240 118.69z"/></svg>
                  </sc-if>
                  <sc-if value="{{ v.volumeNotMuted }}" hint-placeholder-val="{{ true }}">
                    <svg width="15" height="15" viewBox="0 0 256 256" fill="currentColor"><path d="M155.51 24.81a8 8 0 00-8.42.88L77.25 80H32a16 16 0 00-16 16v64a16 16 0 0016 16h45.25l69.84 54.31A8 8 0 00160 224V32a8 8 0 00-4.49-7.19zM208 160a8 8 0 010-16 16 16 0 000-32 8 8 0 010-16 32 32 0 010 64z"/></svg>
                  </sc-if>
                </div>
                <div style="display:flex;flex-direction:column;line-height:1.25">
                  <span style="font-size:12.5px;font-weight:500;color:{{ v.textPrimary }}">Volume</span>
                  <span style="font-size:10px;color:{{ v.textMuted }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px">{{ v.outputDevice }}</span>
                </div>
                <svg width="10" height="10" viewBox="0 0 256 256" fill="{{ v.textMuted }}" style="flex:none;transform:rotate({{ v.volumeChevronRotate }})"><path d="M213.66 101.66l-80 80a8 8 0 01-11.32 0l-80-80a8 8 0 0111.32-11.32L128 164.69l74.34-74.35a8 8 0 0111.32 11.32z"/></svg>
              </div>
              <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:{{ v.textMuted }}">{{ v.volumeLabel }}</span>
            </div>
            <input class="gpui-slider" type="range" min="0" max="100" value="{{ v.volume }}" onchange="{{ v.onVolumeChange }}" oninput="{{ v.onVolumeChange }}" style="color:{{ v.thumbColor }};background:{{ v.trackBg }}"/>
            <sc-if value="{{ v.volumeMenuOpen }}" hint-placeholder-val="{{ false }}">
              <div style="position:absolute;top:36px;left:0;width:220px;background:{{ v.menuBg }};border:1px solid {{ v.cardBorder }};border-radius:8px;padding:4px;z-index:10;display:flex;flex-direction:column">
                <sc-for list="{{ v.outputDevices }}" as="dev" hint-placeholder-count="3">
                  <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:12px;color:{{ v.textPrimary }}" onclick="{{ dev.select }}" style-hover="background:{{ v.hoverBg }}">
                    <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ dev.name }}</span>
                    <sc-if value="{{ dev.selected }}" hint-placeholder-val="{{ false }}">
                      <svg width="12" height="12" viewBox="0 0 256 256" fill="{{ v.accent }}" style="flex:none"><path d="M229.66 77.66l-128 128a8 8 0 01-11.32 0l-56-56a8 8 0 0111.32-11.32L96 188.69 218.34 66.34a8 8 0 0111.32 11.32z"/></svg>
                    </sc-if>
                  </div>
                </sc-for>
              </div>
            </sc-if>
          </div>

          <div style="display:flex;flex-direction:column;gap:8px;position:relative">
            <div style="display:flex;align-items:center;justify-content:space-between">
              <div style="display:flex;align-items:center;gap:7px;cursor:pointer;border-radius:6px;padding:2px 4px;margin:-2px -4px" onclick="{{ v.toggleMicMenu }}" style-hover="background:{{ v.hoverBg }}">
                <div style="width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:{{ v.textMuted }};cursor:pointer" onclick="{{ v.toggleMicMute }}" style-hover="background:{{ v.hoverBg }}">
                  <sc-if value="{{ v.micMuted }}" hint-placeholder-val="{{ false }}">
                    <svg width="15" height="15" viewBox="0 0 256 256" fill="currentColor"><path d="M215.51 96.86a8 8 0 00-11-2.87L192 102.71V80a64.07 64.07 0 00-64-64c-16.2 0-30.9 6.5-41.6 17.1L52.24 4.23a8 8 0 00-9.9 12.56L192 132.28v.11a8 8 0 003.31 6.44l14.35 11.15a63.63 63.63 0 003.61-8.3l-.09.08a8 8 0 0011.28-11.36zM128 168a8 8 0 01-8-8v-13.72l-16-12.44V160a24 24 0 0024 24h.68a63.67 63.67 0 0026.5-6.16l-13.51-10.5A48 48 0 01128 168zm-88-8a8 8 0 00-16 0 88.1 88.1 0 0080 87.6V232H72a8 8 0 000 16h64a8 8 0 000-16h-16v-8.42a87.6 87.6 0 0035.86-13.44l-12.7-9.87A72.13 72.13 0 0140 160z"/></svg>
                  </sc-if>
                  <sc-if value="{{ v.micNotMuted }}" hint-placeholder-val="{{ true }}">
                    <svg width="15" height="15" viewBox="0 0 256 256" fill="currentColor"><path d="M128 176a48.05 48.05 0 0048-48V64a48 48 0 00-96 0v64a48.05 48.05 0 0048 48zM88 64a40 40 0 0180 0v64a40 40 0 01-80 0zm112 64a8 8 0 00-16 0 56.06 56.06 0 01-56 56 8 8 0 000 16 72 72 0 0072-72zm-64 88h-8a8 8 0 000 16h32a8 8 0 000-16h-8v-16.68a72 72 0 0056-72 8 8 0 00-16 0 56.06 56.06 0 01-56 56 56.06 56.06 0 01-56-56 8 8 0 00-16 0 72 72 0 0056 72z"/></svg>
                  </sc-if>
                </div>
                <div style="display:flex;flex-direction:column;line-height:1.25">
                  <span style="font-size:12.5px;font-weight:500;color:{{ v.textPrimary }}">Microphone</span>
                  <span style="font-size:10px;color:{{ v.textMuted }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px">{{ v.inputDevice }}</span>
                </div>
                <svg width="10" height="10" viewBox="0 0 256 256" fill="{{ v.textMuted }}" style="flex:none;transform:rotate({{ v.micChevronRotate }})"><path d="M213.66 101.66l-80 80a8 8 0 01-11.32 0l-80-80a8 8 0 0111.32-11.32L128 164.69l74.34-74.35a8 8 0 0111.32 11.32z"/></svg>
              </div>
              <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:{{ v.textMuted }}">{{ v.micLabel }}</span>
            </div>
            <input class="gpui-slider" type="range" min="0" max="100" value="{{ v.mic }}" onchange="{{ v.onMicChange }}" oninput="{{ v.onMicChange }}" style="color:{{ v.thumbColor }};background:{{ v.trackBg }}"/>
            <sc-if value="{{ v.micMenuOpen }}" hint-placeholder-val="{{ false }}">
              <div style="position:absolute;top:36px;left:0;width:220px;background:{{ v.menuBg }};border:1px solid {{ v.cardBorder }};border-radius:8px;padding:4px;z-index:10;display:flex;flex-direction:column">
                <sc-for list="{{ v.inputDevices }}" as="dev" hint-placeholder-count="3">
                  <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:12px;color:{{ v.textPrimary }}" onclick="{{ dev.select }}" style-hover="background:{{ v.hoverBg }}">
                    <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ dev.name }}</span>
                    <sc-if value="{{ dev.selected }}" hint-placeholder-val="{{ false }}">
                      <svg width="12" height="12" viewBox="0 0 256 256" fill="{{ v.accent }}" style="flex:none"><path d="M229.66 77.66l-128 128a8 8 0 01-11.32 0l-56-56a8 8 0 0111.32-11.32L96 188.69 218.34 66.34a8 8 0 0111.32 11.32z"/></svg>
                    </sc-if>
                  </div>
                </sc-for>
              </div>
            </sc-if>
          </div>

        </div>

        <div style="padding:12px 14px;border-top:1px solid {{ v.cardBorder }};display:flex;gap:8px;position:relative">
          <div style="flex:1;text-align:center;padding:8px 0;border-radius:6px;background:transparent;border:1px solid {{ v.muteBorder }};color:{{ v.muteBtnColor }};font-size:12px;font-weight:600;cursor:pointer" onclick="{{ v.toggleVolumeMute }}" style-hover="border-color:#cba6f7;color:#cba6f7">
            {{ v.volumeMuteLabel }}
          </div>
          <div style="flex:1;text-align:center;padding:8px 0;border-radius:6px;background:transparent;border:1px solid {{ v.muteBorder }};color:{{ v.micBtnColor }};font-size:12px;font-weight:600;cursor:pointer" onclick="{{ v.toggleMicMute }}" style-hover="border-color:#cba6f7;color:#cba6f7">
            {{ v.micMuteLabel }}
          </div>
        </div>

      </div>
    </div>
  </sc-for>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:840,&quot;height&quot;:660}}">
class Component extends DCLogic {
  state = {
    dark: { volume: 62, mic: 78, volumeMuted: false, micMuted: false, volumeMenuOpen: false, micMenuOpen: false, outputDevice: 'Speakers (Built-in)', inputDevice: 'Microphone (Built-in)' },
    light: { volume: 62, mic: 78, volumeMuted: false, micMuted: false, volumeMenuOpen: false, micMenuOpen: false, outputDevice: 'Speakers (Built-in)', inputDevice: 'Microphone (Built-in)' },
  };

  outputDevices = ['Speakers (Built-in)', 'HyperX Cloud II', 'HDMI — LG UltraFine', 'Bluetooth — WF-1000XM4'];
  inputDevices = ['Microphone (Built-in)', 'HyperX QuadCast', 'Webcam Mic', 'Bluetooth — WF-1000XM4'];

  mkVariantState(key, base) {
    const s = this.state[key];
    const patch = (p) => this.setState(st => ({ [key]: { ...st[key], ...p } }));
    return {
      ...base,
      volume: s.volume, mic: s.mic,
      volumeMuted: s.volumeMuted, volumeNotMuted: !s.volumeMuted,
      micMuted: s.micMuted, micNotMuted: !s.micMuted,
      volumeLabel: s.volumeMuted ? 'Muted' : `${s.volume}%`,
      micLabel: s.micMuted ? 'Muted' : `${s.mic}%`,
      volumeMuteLabel: s.volumeMuted ? 'Unmute output' : 'Mute output',
      micMuteLabel: s.micMuted ? 'Unmute mic' : 'Mute mic',
      muteBtnColor: s.volumeMuted ? '#cba6f7' : base.textMuted,
      micBtnColor: s.micMuted ? '#cba6f7' : base.textMuted,
      toggleVolumeMute: () => patch({ volumeMuted: !s.volumeMuted }),
      toggleMicMute: () => patch({ micMuted: !s.micMuted }),
      onVolumeChange: (e) => patch({ volume: Number(e.target.value), volumeMuted: false }),
      onMicChange: (e) => patch({ mic: Number(e.target.value), micMuted: false }),
      toggleVolumeMenu: (e) => { e.stopPropagation(); patch({ volumeMenuOpen: !s.volumeMenuOpen, micMenuOpen: false }); },
      toggleMicMenu: (e) => { e.stopPropagation(); patch({ micMenuOpen: !s.micMenuOpen, volumeMenuOpen: false }); },
      volumeMenuOpen: s.volumeMenuOpen, micMenuOpen: s.micMenuOpen,
      outputDevice: s.outputDevice, inputDevice: s.inputDevice,
      outputDevices: this.outputDevices.map(name => ({ name, selected: name === s.outputDevice, select: () => patch({ outputDevice: name, volumeMenuOpen: false }) })),
      inputDevices: this.inputDevices.map(name => ({ name, selected: name === s.inputDevice, select: () => patch({ inputDevice: name, micMenuOpen: false }) })),
      volumeChevronRotate: s.volumeMenuOpen ? '180deg' : '0deg',
      micChevronRotate: s.micMenuOpen ? '180deg' : '0deg',
    };
  }

  renderVals() {
    const dark = {
      pageBg: '#11111b', labelColor: '#45475a', triggerBg: '#313244', cardBg: '#1e1e2e',
      cardBorder: '#313244', cardShadow: 'none', textPrimary: '#cdd6f4', textMuted: '#a6adc8',
      hoverBg: '#313244', trackBg: '#313244', thumbColor: '#cdd6f4', muteBorder: '#45475a',
      menuBg: '#181825', accent: '#007acc', showWatermark: false, glowTop: false, watermarkOpacity: 0,
    };

    const light = {
      pageBg: '#dde0f2', labelColor: '#7d80a6', triggerBg: '#e6e9fa', cardBg: '#e6e9fa',
      cardBorder: '#c4c8e6', cardShadow: '0 6px 24px rgba(60,64,110,0.16), inset 0 0 0 1px rgba(0,122,204,0.15)',
      textPrimary: '#2c2e4a', textMuted: '#5a5d80', hoverBg: '#e0e3f4', trackBg: '#cfd3ec',
      thumbColor: '#2c2e4a', muteBorder: '#c4c8e6', menuBg: '#eceefa', accent: '#007acc',
      showWatermark: true, glowTop: true, watermarkOpacity: 0.18,
    };

    return {
      variants: [
        { ...this.mkVariantState('dark', dark), label: 'Dark — reference' },
        { ...this.mkVariantState('light', light), label: 'Light — accepted (Light C)' },
      ],
    };
  }
}
</script>
</body>
</html>
