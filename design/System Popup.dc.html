<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#11111b;font-family:'Inter',sans-serif}
::selection{background:#cba6f7;color:#11111b}
.gpui-toggle{position:relative;width:34px;height:19px;border-radius:9999px;cursor:pointer;flex:none;transition:background .12s}
.gpui-toggle .knob{position:absolute;top:2px;width:15px;height:15px;border-radius:50%;background:#cdd6f4;transition:left .15s}
</style>
</helmet>
<div style="position:relative;width:100vw;height:100vh;background:#11111b;overflow:hidden">
  <div style="position:absolute;top:14px;right:24px;width:34px;height:34px;border-radius:6px;background:#313244;display:flex;align-items:center;justify-content:center;color:#a6adc8">
    <svg width="15" height="15" viewBox="0 0 32 32" fill="none">
      <path d="M16 3L27 11V25L16 29L5 25V11L16 3Z" stroke="#007acc" stroke-width="2" stroke-linejoin="round"/>
      <path d="M16 3V15M16 15L27 11M16 15L5 11M16 15V29" stroke="#007acc" stroke-width="1.2" stroke-linejoin="round"/>
      <circle cx="16" cy="15" r="2.4" fill="#007acc"/>
    </svg>
  </div>

  <div style="position:absolute;top:56px;right:24px;width:360px;background:#1e1e2e;border:1px solid #313244;border-radius:10px;font-family:'Inter',sans-serif;color:#cdd6f4;display:flex;flex-direction:column">

    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid #313244">
      <div style="font-size:13px;font-weight:600;color:#cdd6f4">System</div>
      <div style="width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#6c7086;cursor:pointer" style-hover="background:#313244;color:#cdd6f4">
        <svg width="13" height="13" viewBox="0 0 256 256" fill="currentColor"><path d="M205.66 194.34a8 8 0 01-11.32 11.32L128 139.31l-66.34 66.35a8 8 0 01-11.32-11.32L116.69 128 50.34 61.66a8 8 0 0111.32-11.32L128 116.69l66.34-66.35a8 8 0 0111.32 11.32L139.31 128z"/></svg>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;padding:14px;gap:8px">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:center;gap:7px">
          <svg width="15" height="15" viewBox="0 0 32 32" fill="none">
            <path d="M16 4L23 9V19L16 24L9 19V9L16 4Z" stroke="#a6adc8" stroke-width="1.8" stroke-linejoin="round"/>
            <path d="M16 4V13.5M16 13.5L23 9M16 13.5L9 9" stroke="#a6adc8" stroke-width="1.1" stroke-linejoin="round"/>
            <circle cx="16" cy="24" r="2" fill="#a6adc8"/>
          </svg>
          <span style="font-size:12.5px;font-weight:500;color:#cdd6f4">Brightness</span>
        </div>
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#a6adc8">{{ brightnessLabel }}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#a6adc8;cursor:pointer;flex:none" onclick="{{ decBrightness }}" style-hover="background:#313244">
          <svg width="11" height="11" viewBox="0 0 256 256" fill="currentColor"><rect x="40" y="116" width="176" height="24" rx="8"/></svg>
        </div>
        <div style="flex:1;height:4px;border-radius:3px;background:#313244;position:relative">
          <div style="position:absolute;left:0;top:0;bottom:0;border-radius:3px;background:#cdd6f4;width:{{ brightnessPct }}"></div>
        </div>
        <div style="width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#a6adc8;cursor:pointer;flex:none" onclick="{{ incBrightness }}" style-hover="background:#313244">
          <svg width="11" height="11" viewBox="0 0 256 256" fill="currentColor"><path d="M228 128a12 12 0 01-12 12h-76v76a12 12 0 01-24 0v-76H40a12 12 0 010-24h76V40a12 12 0 0124 0v76h76a12 12 0 0112 12z"/></svg>
        </div>
      </div>
    </div>

    <div style="height:1px;background:#313244"></div>

    <div style="display:flex;flex-direction:column;padding:14px;gap:9px">
      <span style="font-size:12.5px;font-weight:500;color:#cdd6f4">Power profile</span>
      <div style="display:flex;border-radius:6px;overflow:hidden;border:1px solid #45475a">
        <sc-for list="{{ profiles }}" as="p" hint-placeholder-count="3">
          <div style="flex:1;text-align:center;padding:6px 0;font-size:11.5px;font-weight:600;cursor:pointer;color:{{ p.color }};background:{{ p.bg }}" onclick="{{ p.select }}" style-hover="background:{{ p.hoverBg }}">{{ p.label }}</div>
        </sc-for>
      </div>
    </div>

    <div style="height:1px;background:#313244"></div>

    <div style="display:flex;flex-direction:column;padding:14px;gap:8px">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:12.5px;font-weight:500;color:#cdd6f4">Gaming mode</span>
        <div class="gpui-toggle" style="background:{{ gamingTrack }}" onclick="{{ toggleGaming }}">
          <div class="knob" style="left:{{ gamingKnobLeft }}"></div>
        </div>
      </div>
      <div style="font-size:10.5px;line-height:1.5;color:#6c7086">Performance profile · No animations · Do Not Disturb · Hide bar/dock · VSync forced</div>
    </div>

  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:460}}">
class Component extends DCLogic {
  state = { brightness: 72, profile: 'balanced', gaming: false };

  renderVals() {
    const s = this.state;
    const profileDefs = [
      { key: 'quiet', label: 'Quiet' },
      { key: 'balanced', label: 'Balanced' },
      { key: 'performance', label: 'Performance' },
    ];
    return {
      brightnessLabel: `${s.brightness}%`,
      brightnessPct: `${s.brightness}%`,
      incBrightness: () => this.setState(s => ({ brightness: Math.min(100, s.brightness + 5) })),
      decBrightness: () => this.setState(s => ({ brightness: Math.max(0, s.brightness - 5) })),
      profiles: profileDefs.map(p => ({
        label: p.label,
        bg: s.profile === p.key ? '#007acc' : 'transparent',
        color: s.profile === p.key ? '#1e1e2e' : '#a6adc8',
        hoverBg: s.profile === p.key ? '#007acc' : '#313244',
        select: () => this.setState({ profile: p.key }),
      })),
      gamingTrack: s.gaming ? '#007acc' : '#45475a',
      gamingKnobLeft: s.gaming ? '17px' : '2px',
      toggleGaming: () => this.setState(s => ({ gaming: !s.gaming })),
    };
  }
}
</script>
</body>
</html>
